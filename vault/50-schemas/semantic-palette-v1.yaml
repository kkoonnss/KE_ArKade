# ==========================================================================
# KE_ArKade — Semantic Palette v1  (FROZEN)
# ==========================================================================
# This is the single most load-bearing file in the project. Every arena
# compiler, every cartridge adapter, and the hub's arena view all read from
# this vocabulary. DO NOT edit class IDs or meanings once a cartridge ships
# against them. Additive-only changes go to v1.x using reserved indices.
#
# Step-0 reconciliation note:
#   The two source docs (deep-research-report.md and Technical Architecture
#   Specification.md) AGREE on classes 0-7 and DISAGREE on 8-9:
#     - deep-research: 8 = decor_ignore, 9 = ui_block
#     - tech-arch:     8 = tracking,     9 = disabled / ui-safe
#   Resolution: 8 = tracking (forward-compat for body-tracking, Phase 2),
#               9 = ui_safe  (merges "ui_block" + "disabled" + "decor_ignore").
#
#   The docs also conflicted on COLOR (e.g. "white" used for both solid and
#   tracking; "cyan" used for play area in the brand note but not in the map
#   spec). Resolution: a class has TWO distinct colors for two distinct jobs:
#     - authoring_color : what the operator PAINTS and the compiler READS.
#                         Chosen for maximum RGB separation, not aesthetics.
#     - ui_color        : how the HUB DISPLAYS that class in the arena view.
#                         This is the brand wayfinding palette (Nintendo x
#                         Blackmagic). Display != source-of-truth.
# ==========================================================================

schema: semantic-palette
version: 1.0.0
status: frozen
frozen_on: 2026-06-19

# Tolerance (per-channel, 0-255) used when the compiler snaps a source pixel
# to the nearest authoring_color. Keep authoring colors >= 64 apart so a
# painted/photographed arena never lands ambiguously between two classes.
match:
  color_space: srgb
  per_channel_tolerance: 32
  unmatched_pixel_policy: nearest   # nearest | empty | error

classes:
  - id: 0
    name: empty
    meaning: No gameplay surface. Ignored by all logic. Default background.
    authoring_color: "#000000"
    ui_color:        "#0A0A0A"
  - id: 1
    name: solid
    meaning: Collision / filled region. Walls and blockers.
    authoring_color: "#FFFFFF"
    ui_color:        "#E8E8E8"
  - id: 2
    name: path
    meaning: Traversable lane, corridor, or tunnel for movement.
    authoring_color: "#808080"
    ui_color:        "#9AA0A6"
  - id: 3
    name: platform_top
    meaning: Intentional walkable / jumpable top edge (orientation-aware; see below).
    authoring_color: "#2E6BFF"
    ui_color:        "#2E6BFF"
  - id: 4
    name: hazard
    meaning: Damage zone or fail area.
    authoring_color: "#FF7A00"
    ui_color:        "#FF7A00"   # brand: Orange
  - id: 5
    name: spawn
    meaning: Entry point for players, enemies, or items.
    authoring_color: "#00C853"
    ui_color:        "#00E676"   # brand: Green
  - id: 6
    name: goal
    meaning: Endpoint, checkpoint, or finish line.
    authoring_color: "#FF00FF"
    ui_color:        "#FF2EC4"   # brand: Magenta
  - id: 7
    name: pickup
    meaning: Collectible or interactive seed point.
    authoring_color: "#FFE000"
    ui_color:        "#FFD400"   # brand: Yellow
  - id: 8
    name: tracking
    meaning: >
      Active vision-tracking zone. RESERVED FOR PHASE 2 (body tracking).
      MVP cartridges must treat as non-blocking decor. Declared now so the
      schema never has to break to add tracking later.
    authoring_color: "#00E5FF"
    ui_color:        "#00E5FF"   # brand: Cyan (play/active)
  - id: 9
    name: ui_safe
    meaning: >
      Do not place HUD/score/critical UI here, and treat as inactive for
      gameplay. Merges the old "ui_block", "disabled", and "decor_ignore".
    authoring_color: "#3A3A3A"
    ui_color:        "#3A3A3A"   # brand: Gray (disabled)

# Reserved for additive v1.x growth. Cartridges must ignore unknown IDs.
reserved_ids: [10, 11, 12, 13, 14, 15]

# --------------------------------------------------------------------------
# Orientation = the PHYSICAL MOUNTING PLANE, not a gameplay rule:
#   wall   -> vertical plane (the MVP target: easy to test on screens/walls).
#   floor  -> horizontal plane (Phase 2+; expects ground props / trackers).
#   table  -> horizontal small-scale (board-game / tabletop).
#
# GRAVITY is a separate, per-cartridge trait (NOT implied by orientation):
#   - Tetris-like needs a "down" -> REQUIRES wall.
#   - Pac-Man-like is gravity-agnostic -> accepts wall OR floor.
# Cartridges declare what they need via `requires.orientation` and the hub
# only offers a cartridge on a scene whose orientation it supports.
#
# MVP = wall. Do not let floor/tracker future-planning tax the wall MVP.
# --------------------------------------------------------------------------
